name: Windows Installer

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (for example refs/tags/v0.2.0)"
        required: false
        default: ""
      version:
        description: "Version string to publish in the installer and release asset"
        required: false
        default: ""

jobs:
  build-installer:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Derive version
        id: version
        shell: pwsh
        run: |
          $version = "${{ inputs.version }}"
          if ([string]::IsNullOrWhiteSpace($version)) {
            $version = "${{ github.ref_name }}"
          }
          if ($version.StartsWith("refs/tags/")) { $version = $version.Substring(10) }
          if ($version.StartsWith("v")) { $version = $version.Substring(1) }
          if ([string]::IsNullOrWhiteSpace($version)) { $version = "0.2.0-dev" }
          "value=$version" >> $env:GITHUB_OUTPUT

      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[dev]

      - name: Build executable
        shell: pwsh
        run: |
          pyinstaller `
            --noconfirm `
            --clean `
            --onedir `
            --console `
            --name focale `
            --paths src `
            --collect-submodules arcsecond `
            --collect-submodules astrometry `
            --hidden-import astrometry_extension `
            --collect-submodules focale `
            src/focale/__main__.py

      - name: Install Inno Setup
        id: innosetup
        shell: pwsh
        run: |
          $candidates = @(
            "$env:RUNNER_TEMP\InnoSetup\ISCC.exe",
            "$env:ProgramFiles(x86)\Inno Setup 6\ISCC.exe",
            "$env:ProgramFiles\Inno Setup 6\ISCC.exe"
          )

          $iscc = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1

          if (-not $iscc) {
            $installer = Join-Path $env:RUNNER_TEMP "innosetup-6.7.1.exe"
            $installDir = Join-Path $env:RUNNER_TEMP "InnoSetup"

            Invoke-WebRequest `
              -Uri "https://github.com/jrsoftware/issrc/releases/download/is-6_7_1/innosetup-6.7.1.exe" `
              -OutFile $installer

            $process = Start-Process `
              -FilePath $installer `
              -ArgumentList "/VERYSILENT", "/SUPPRESSMSGBOXES", "/NORESTART", "/SP-", "/DIR=$installDir" `
              -Wait `
              -PassThru

            if ($process.ExitCode -ne 0) {
              throw "Inno Setup installer exited with code $($process.ExitCode)."
            }

            $iscc = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          }

          if (-not $iscc) {
            throw "Unable to locate ISCC.exe after installing Inno Setup."
          }

          Write-Host "Using ISCC at: $iscc"
          Write-Host "ISCC version: $((Get-Item $iscc).VersionInfo.FileVersion)"

          "path=$iscc" >> $env:GITHUB_OUTPUT

      - name: Build installer
        shell: pwsh
        run: |
          if (-not (Test-Path "dist\focale")) {
            throw "PyInstaller output directory dist\\focale was not created."
          }

          & "${{ steps.innosetup.outputs.path }}" `
            /DMyAppVersion=${{ steps.version.outputs.value }} `
            packaging/windows/focale.iss

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: focale-windows-installer-${{ steps.version.outputs.value }}
          path: dist/windows/*.exe

      - name: Publish installer to GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || inputs.version != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.value }}
          files: dist/windows/*.exe
          generate_release_notes: true
