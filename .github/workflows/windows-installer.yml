name: Windows Installer

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-installer:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Derive version
        id: version
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          if ($version.StartsWith("v")) { $version = $version.Substring(1) }
          if ([string]::IsNullOrWhiteSpace($version)) { $version = "0.1.0-dev" }
          "value=$version" >> $env:GITHUB_OUTPUT

      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[dev]

      - name: Build executable
        shell: pwsh
        run: |
          pyinstaller `
            --noconfirm `
            --clean `
            --onedir `
            --console `
            --name focale `
            --paths src `
            --collect-submodules arcsecond `
            --collect-submodules focale `
            src/focale/__main__.py

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          iscc /DMyAppVersion=${{ steps.version.outputs.value }} packaging/windows/focale.iss

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: focale-windows-installer-${{ steps.version.outputs.value }}
          path: dist/windows/*.exe
